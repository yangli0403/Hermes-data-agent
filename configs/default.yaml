# Hermes Data Agent — Default Configuration
# This config is used when no --config flag is provided.

# ── Model Configuration ──
# Uses the same model format as hermes-agent (OpenAI-compatible)
model:
  name: gpt-4.1-mini
  temperature: 0.9
  max_tokens: 4096

# ── Synthesis Configuration ──
synthesis:
  num_variants: 5
  batch_size: 5
  max_retries: 3

# ── Validation Configuration ──
validation:
  enabled: true
  pass_threshold: 0.75

# ── I/O Paths ──
io:
  input_path: data/数据处理测试.xlsx
  output_json: output/泛化结果.json
  output_excel: output/泛化结果.xlsx

# ── Batch Runner Configuration (NEW) ──
# Used by the `batch` command. Leverages hermes-agent's BatchRunner for
# parallel processing with checkpointing and trajectory saving.
batch:
  run_name: cockpit_run
  workers: 4                  # Parallel worker count
  batch_size: 5               # Prompts per batch
  resume: false               # Resume from checkpoint
  dataset_dir: data           # Directory for JSONL datasets and checkpoints
  trajectory_format: jsonl    # Trajectory output format

# ── Delegation Configuration (NEW) ──
# Used by the `--use-delegate` flag. Leverages hermes-agent's delegate_tool
# to spawn child agents for synthesis and validation.
delegation:
  enabled: true
  max_concurrent_children: 3  # Max parallel child agents (hermes-agent default)
  max_iterations: 10          # Max tool-calling turns per child agent
  max_retries: 3              # Max validation retry rounds
  # model: gpt-4.1-mini      # Override child agent model (inherits parent by default)
  # provider: null            # Override child agent provider

# ── Evolution Configuration ──
# Used by the `evolve` command (requires hermes-agent-self-evolution)
evolution:
  enabled: false
  iterations: 10
  population_size: 5
  eval_sample_size: 20
  optimizer_model: openai/gpt-4.1
  eval_model: openai/gpt-4.1-mini

# ── Hermes Agent Integration ──
# When use_agent is true, the full hermes-agent AIAgent loop is used
# instead of direct tool handler calls.
hermes:
  use_agent: false
  use_delegate: false
  toolsets:
    - cockpit-data
    - delegation
  skills:
    - cockpit-utterance-synthesis
    - cockpit-utterance-validation
    - cockpit-delegation-orchestrator
